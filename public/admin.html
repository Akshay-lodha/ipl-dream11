<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPL Scraper Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    .header {
      background: white;
      padding: 30px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { color: #333; margin-bottom: 10px; }
    .subtitle { color: #666; font-size: 14px; }
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .card h2 { color: #333; font-size: 18px; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
    .form-group {
      margin-bottom: 15px;
    }
    label { display: block; color: #333; font-weight: 500; margin-bottom: 5px; font-size: 13px; }
    input, textarea, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    input:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
    .team-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 4px;
      align-items: center;
    }
    .team-row input { margin-bottom: 0; }
    .team-row label { margin-bottom: 0; font-size: 11px; }
    .team-row small { display: block; color: #999; font-size: 10px; margin-top: 2px; }
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
      flex: 1;
    }
    .btn-primary:hover { background: #5568d3; }
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
      flex: 1;
    }
    .btn-secondary:hover { background: #d0d0d0; }
    .btn-small {
      padding: 6px 12px;
      font-size: 12px;
      background: #f0f0f0;
      color: #333;
    }
    .btn-small:hover { background: #e0e0e0; }
    .status-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .status-table th, .status-table td {
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    .status-table th {
      background: #f8f9fa;
      font-weight: 600;
      color: #333;
    }
    .status-table tr:hover { background: #f8f9fa; }
    .alert {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 15px;
      display: none;
    }
    .alert.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    .alert.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
      display: block;
    }
    .loading { display: none; }
    .loading.show {
      display: inline-block;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .section-title {
      color: #333;
      font-size: 14px;
      font-weight: 600;
      margin: 20px 0 10px 0;
    }
    .quick-actions {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏏 IPL Points Table Admin</h1>
      <p class="subtitle">Manually update team standings - Deploy to your app instantly</p>
    </div>

    <div class="main-grid">
      <!-- Update Form -->
      <div class="card">
        <h2>📊 Update Standings</h2>

        <div id="alert"></div>

        <div class="form-group">
          <label>🔐 Secret Key</label>
          <input type="password" id="secret" placeholder="Enter update secret" value="manual-update-2026">
        </div>

        <div class="section-title">Team Data</div>
        <div id="teamsContainer"></div>

        <button class="btn-small" onclick="addTeam()" style="width: 100%; margin-bottom: 15px;">+ Add Team</button>

        <div class="button-group">
          <button class="btn-primary" onclick="updateScores()">
            <span id="updateBtn">🚀 Deploy Updates</span>
            <span class="loading" id="updateLoading">⏳</span>
          </button>
          <button class="btn-secondary" onclick="loadTemplate('current')">Load Current</button>
        </div>
      </div>

      <!-- Status & Preview -->
      <div class="card">
        <h2>📈 Current Status</h2>

        <div id="statusInfo" style="margin-bottom: 20px;">
          <p style="color: #999; font-size: 13px;">Loading...</p>
        </div>

        <div class="section-title">Leaderboard Preview</div>
        <div style="max-height: 400px; overflow-y: auto;">
          <table class="status-table" id="previewTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Team</th>
                <th>M</th>
                <th>W</th>
                <th>L</th>
                <th>NRR</th>
                <th>Pts</th>
              </tr>
            </thead>
            <tbody>
              <tr><td colspan="7" style="text-align: center; color: #999;">No data yet</td></tr>
            </tbody>
          </table>
        </div>

        <div class="quick-actions" style="margin-top: 20px;">
          <button class="btn-small" onclick="loadTemplate('sample')" style="flex: 1;">📋 Sample Data</button>
          <button class="btn-small" onclick="refreshStatus()" style="flex: 1;">🔄 Refresh</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URL = window.location.origin;
    const DEFAULT_TEAMS = ['RCB', 'DC', 'MI', 'PBKS', 'RR', 'CSK', 'GT', 'KKR', 'LSG', 'SRH'];

    // Initialize on load
    window.addEventListener('load', () => {
      initializeTeams();
      refreshStatus();
      setInterval(refreshStatus, 30000); // Refresh every 30s
    });

    function initializeTeams() {
      const container = document.getElementById('teamsContainer');
      container.innerHTML = '';
      DEFAULT_TEAMS.forEach((team, i) => {
        const row = document.createElement('div');
        row.className = 'team-row';
        row.innerHTML = `
          <div>
            <label>Team</label>
            <small>Abbreviation</small>
            <input type="text" value="${team}" class="team-input" data-field="team" data-index="${i}" readonly style="background: #e0e0e0;">
          </div>
          <div>
            <label>M</label>
            <small>Matches</small>
            <input type="number" placeholder="0" class="team-input" data-field="m" data-index="${i}" value="1">
          </div>
          <div>
            <label>W</label>
            <small>Wins</small>
            <input type="number" placeholder="0" class="team-input" data-field="w" data-index="${i}" value="1">
          </div>
          <div>
            <label>L</label>
            <small>Losses</small>
            <input type="number" placeholder="0" class="team-input" data-field="l" data-index="${i}" value="0">
          </div>
          <div>
            <label>NRR</label>
            <small>Net Run Rate</small>
            <input type="number" step="0.01" placeholder="0.00" class="team-input" data-field="nrr" data-index="${i}" value="0">
          </div>
          <div>
            <label>Pts</label>
            <small>Points</small>
            <input type="number" placeholder="0" class="team-input" data-field="pts" data-index="${i}" value="2">
          </div>
          <div>
            <label>Form</label>
            <small>W/L</small>
            <input type="text" placeholder="W,L" class="team-input" data-field="form" data-index="${i}" value="W">
          </div>
        `;
        container.appendChild(row);
      });
    }

    function addTeam() {
      alert('Teams are fixed. Edit the values above to update standings.');
    }

    function getTeamsData() {
      const teams = [];
      document.querySelectorAll('.team-input').forEach(input => {
        const index = parseInt(input.dataset.index);
        const field = input.dataset.field;

        if (!teams[index]) {
          teams[index] = {};
        }

        let value = input.value;
        if (field === 'form') {
          value = value.split(',').map(v => v.trim()).filter(v => v);
        } else if (field === 'm' || field === 'w' || field === 'l' || field === 'pts') {
          value = parseInt(value) || 0;
        } else if (field === 'nrr') {
          value = parseFloat(value) || 0;
        }

        teams[index][field] = value;
      });

      return teams.filter(Boolean);
    }

    function updatePreview() {
      const teams = getTeamsData().sort((a, b) => b.pts - a.pts || b.nrr - a.nrr);
      const tbody = document.querySelector('#previewTable tbody');

      if (teams.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: #999;">No data</td></tr>';
        return;
      }

      tbody.innerHTML = teams.map((t, i) => `
        <tr>
          <td><strong>${i + 1}</strong></td>
          <td><strong>${t.team}</strong></td>
          <td>${t.m}</td>
          <td>${t.w}</td>
          <td>${t.l}</td>
          <td>${t.nrr > 0 ? '+' : ''}${t.nrr.toFixed(2)}</td>
          <td><strong>${t.pts}</strong></td>
        </tr>
      `).join('');
    }

    document.addEventListener('input', updatePreview);

    async function updateScores() {
      const secret = document.getElementById('secret').value;
      const teams = getTeamsData();
      const alert = document.getElementById('alert');

      if (!secret) {
        showAlert('❌ Please enter secret key', 'error');
        return;
      }

      if (teams.length < 8) {
        showAlert('❌ Need at least 8 teams', 'error');
        return;
      }

      const btn = document.getElementById('updateBtn');
      const loader = document.getElementById('updateLoading');
      btn.style.display = 'none';
      loader.classList.add('show');

      try {
        const response = await fetch(`${API_URL}/api/update`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ secret, teams }),
        });

        const data = await response.json();

        if (response.ok) {
          showAlert(`✅ Successfully updated ${data.teams.length} teams!`, 'success');
          setTimeout(refreshStatus, 1000);
        } else {
          showAlert(`❌ Error: ${data.error || 'Unknown error'}`, 'error');
        }
      } catch (err) {
        showAlert(`❌ Failed to update: ${err.message}`, 'error');
      } finally {
        btn.style.display = 'inline';
        loader.classList.remove('show');
      }
    }

    async function refreshStatus() {
      try {
        const response = await fetch(`${API_URL}/api/teams`);
        const data = await response.json();

        const lastUpdate = new Date(data.lastScraped || data.timestamp).toLocaleString();
        const sourceText = data.source || 'Fallback Data';

        document.getElementById('statusInfo').innerHTML = `
          <div style="color: #333; font-size: 13px;">
            <p>📡 <strong>Source:</strong> ${sourceText}</p>
            <p>⏰ <strong>Updated:</strong> ${lastUpdate}</p>
            <p>📊 <strong>Teams:</strong> ${data.teams.length}</p>
            ${data.warning ? `<p style="color: #d97706;">⚠️ ${data.warning}</p>` : ''}
          </div>
        `;

        // Update leaderboard preview
        const sorted = data.teams.sort((a, b) => b.pts - a.pts || b.nrr - a.nrr);
        const tbody = document.querySelector('#previewTable tbody');
        tbody.innerHTML = sorted.map((t, i) => `
          <tr>
            <td><strong>${i + 1}</strong></td>
            <td><strong>${t.team}</strong></td>
            <td>${t.m}</td>
            <td>${t.w}</td>
            <td>${t.l}</td>
            <td>${t.nrr > 0 ? '+' : ''}${t.nrr.toFixed(2)}</td>
            <td><strong>${t.pts}</strong></td>
          </tr>
        `).join('');

        // Load into form
        loadTemplate('current');
      } catch (err) {
        console.error('Failed to refresh:', err);
      }
    }

    function loadTemplate(type) {
      if (type === 'current') {
        // Load current data from API
        fetch(`${API_URL}/api/teams`)
          .then(r => r.json())
          .then(data => {
            document.querySelectorAll('.team-input').forEach(input => {
              const index = parseInt(input.dataset.index);
              const field = input.dataset.field;
              const team = data.teams[index];

              if (team) {
                if (field === 'form') {
                  input.value = team.form?.join(',') || '';
                } else {
                  input.value = team[field] || '';
                }
              }
            });
            updatePreview();
          });
      }
    }

    function showAlert(msg, type) {
      const alert = document.getElementById('alert');
      alert.className = `alert ${type}`;
      alert.textContent = msg;
      setTimeout(() => {
        if (type !== 'success') alert.style.display = 'none';
      }, 5000);
    }
  </script>
</body>
</html>
